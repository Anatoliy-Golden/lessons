<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- шрифт через плагин -->

    <!-- локальное подключение шрифтов -->
    <link rel="stylesheet" href="css/fonts.css" />

    <!-- сброс стилей браузера -->
    <link rel="stylesheet" href="css/reset.css" />

    <!-- подключение файла css к html -->
    <link rel="stylesheet" href="css/style.css" />
    <title>Lesson 09</title>
  </head>
  <body>
    <div class="wrapper">
      <!-- header -->
      <header class="header">
        <div class="header__container">
          <h1 class="header__title">BEM</h1>
        </div>
      </header>

      <!-- page -->
      <main class="page">
        <div class="blog">
          <div class="blog__container">
            <div class="blog__header header-block">
              <div class="header-block__icon"><img src="#" alt="icon" /></div>
              <div class="header-block__lable"></div>
              <h2 class="header-block__title"></h2>
            </div>

            <div class="blog__content">
              <div class="blog__card card">
                <div class="card__item">
                  <div class="card__image"><img src="" alt="" /></div>
                  <div class="card__meta">
                    <div class="card__category"></div>
                    <div class="card__data"></div>
                  </div>
                  <div class="card__content">
                    <h2 class="card__tite"></h2>
                    <div class="card__text"><p></p></div>
                    <a class="card__button button" href="#"></a>
                  </div>
                </div>
              </div>

              <div class="blog__list card">
                <div class="card__item">
                  <div class="card__image"><img src="" alt="" /></div>
                  <div class="card__category"></div>
                  <div class="card__content">
                    <h2 class="card__tite"></h2>
                    <div class="card__text"><p></p></div>
                  </div>
                </div>

                <div class="card__item">
                  <div class="card__image"><img src="" alt="" /></div>
                  <div class="card__category"></div>
                  <div class="card__content">
                    <h2 class="card__tite"></h2>
                    <div class="card__text"><p></p></div>
                  </div>
                </div>

                <div class="card__item">
                  <div class="card__image"><img src="" alt="" /></div>
                  <div class="card__category"></div>
                  <div class="card__content">
                    <h2 class="card__tite"></h2>
                    <div class="card__text"><p></p></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="faq">
          <div class="faq__container">
            <div class="faq__header header-block">
              <div class="header-block__icon"><img src="#" alt="icon" /></div>
              <div class="header-block__lable"></div>
              <h2 class="header-block__title"></h2>
            </div>

            <div class="faq__list questions">
              <div class="questions__item">
                <div class="questions__text"><p></p></div>
                <div class="questions__icon"><img src="#" alt="icon" /></div>
              </div>

              <div class="questions__item">
                <div class="questions__text"><p></p></div>
                <div class="questions__icon"><img src="#" alt="icon" /></div>
              </div>

              <div class="questions__item">
                <div class="questions__text"><p></p></div>
                <div class="questions__icon"><img src="#" alt="icon" /></div>
              </div>

              <div class="questions__item">
                <div class="questions__text"><p></p></div>
                <div class="questions__icon"><img src="#" alt="icon" /></div>
              </div>

              <div class="questions__item">
                <div class="questions__text"><p></p></div>
                <div class="questions__icon"><img src="#" alt="icon" /></div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- footer -->
      <footer class="footer">
        <div class="footer__container"></div>
      </footer>
    </div>
  </body>
</html>
